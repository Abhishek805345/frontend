<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Welcome | Todo App</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: "Segoe UI", Tahoma, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #dbeafe, #ffffff);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* Decorative background circles */
    body::before,
    body::after {
      content: "";
      position: absolute;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: rgba(13,110,253,0.12);
      z-index: -1;
    }

    body::before {
      top: -80px;
      left: -80px;
    }

    body::after {
      bottom: -100px;
      right: -100px;
    }

    .welcome-container {
      background: rgba(255,255,255,0.95);
      width: 540px;
      max-width: 95%;
      padding: 45px 35px;
      border-radius: 22px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.18);
      animation: fadeUp 0.8s ease;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .welcome-icon {
      font-size: 52px;
      margin-bottom: 10px;
    }

    .welcome-container h1 {
      color: #0d6efd;
      margin-bottom: 12px;
      font-size: 32px;
      font-weight: 700;
    }

    .welcome-container p {
      color: #444;
      font-size: 15.5px;
      line-height: 1.7;
      margin-bottom: 35px;
    }

    .features {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .feature {
      flex: 1;
      min-width: 140px;
      background: #f1f5ff;
      padding: 12px;
      border-radius: 12px;
      font-size: 13px;
      color: #333;
    }

    .feature span {
      font-size: 20px;
      display: block;
      margin-bottom: 5px;
    }

    .btn-group {
      display: flex;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 13px 28px;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, #0d6efd, #084298);
      color: #ffffff;
      box-shadow: 0 10px 22px rgba(13,110,253,0.35);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 28px rgba(13,110,253,0.45);
    }

    .btn-outline {
      background: transparent;
      color: #0d6efd;
      border: 2px solid #0d6efd;
    }

    .btn-outline:hover {
      background: #0d6efd;
      color: #ffffff;
      transform: translateY(-3px);
    }

    .footer-text {
      margin-top: 30px;
      font-size: 13px;
      color: #666;
    }
  </style>
</head>

<body>

  <div class="welcome-container">
    <div class="welcome-icon">📝</div>

    <h1>Welcome to Todo App</h1>
    <p>
      Organize your tasks, manage your time, and stay productive every day.
      A simple, clean, and powerful task manager built for focus.
    </p>

    <div class="features">
      <div class="feature">
        <span>✅</span>
        Easy Tasks
      </div>
      <div class="feature">
        <span>⏱️</span>
        Time Control
      </div>
      <div class="feature">
        <span>🔒</span>
        Secure Login
      </div>
    </div>

    <div class="btn-group">
      <a href="/login"><button class="btn btn-primary">Login</button></a>
      <a href="/register"><button class="btn btn-outline">Register</button></a>
    </div>

    <div class="footer-text">
      © 2026 Todo App • Stay organized, stay focused
    </div>
  </div>

</body>
</html>
